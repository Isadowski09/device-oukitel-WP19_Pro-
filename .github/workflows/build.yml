name: Compile OrangeFox Recovery

on:
  workflow_dispatch:
    inputs:
      MANIFEST_URL:
        description: 'OrangeFox Manifest URL'
        required: true
        default: 'https://github.com/OrangeFoxRecovery/manifest.git'
      MANIFEST_BRANCH:
        description: 'OrangeFox Branch'
        required: true
        default: 'fox_12.1'
      DEVICE_TREE_URL:
        description: 'Your Device Tree Repo URL'
        required: true
        default: 'https://github.com/Isadowski09/device-oukitel-WP19_Pro-'
      DEVICE_TREE_BRANCH:
        description: 'Device Tree Branch'
        required: true
        default: 'main'
      DEVICE_PATH:
        description: 'Path to clone to'
        required: true
        default: 'device/oukitel/WP19_Pro'
      DEVICE_NAME:
        description: 'Target Device Name'
        required: true
        default: 'WP19_Pro'
      MAKEFILE_TYPE:
        description: 'Makefile Type (omni or twrp)'
        required: true
        default: 'twrp'

jobs:
  build:
    name: Build Recovery for ${{ github.event.inputs.DEVICE_NAME }}
    runs-on: ubuntu-20.04
    permissions:
      contents: write

    steps:
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 1024
          swap-size-mb: 8192
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: Set up Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev libc6-dev-i386 x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig

      - name: Install Repo Tool
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          sudo ln -sf ~/bin/repo /usr/bin/repo

      - name: Initialize and Sync Manifest
        run: |
          mkdir -p ~/workspace
          cd ~/workspace
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          repo init -u ${{ github.event.inputs.MANIFEST_URL }} -b ${{ github.event.inputs.MANIFEST_BRANCH }} --depth=1
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

      - name: Clone Device Tree
        run: |
          cd ~/workspace
          git clone ${{ github.event.inputs.DEVICE_TREE_URL }} -b ${{ github.event.inputs.DEVICE_TREE_BRANCH }} ${{ github.event.inputs.DEVICE_PATH }}

      - name: Build OrangeFox Recovery
        run: |
          cd ~/workspace
          source build/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          export FOX_USE_TWRP_RECOVERY_IMAGE_BUILDER=1
          export LC_ALL="C"
          lunch ${{ github.event.inputs.MAKEFILE_TYPE }}_${{ github.event.inputs.DEVICE_NAME }}-eng
          mka adbd recoveryimage

      - name: Upload Recovery Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OrangeFox-${{ github.event.inputs.DEVICE_NAME }}
          path: ~/workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/recovery.img
