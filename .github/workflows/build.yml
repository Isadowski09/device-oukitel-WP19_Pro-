name: OrangeFox Recovery Build (MT6789 Vendor Boot)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git wget curl bc bison build-essential ccache \
            flex g++-multilib gcc-multilib gnupg gperf imagemagick \
            lib32ncurses5-dev lib32readline-dev lib32z1-dev \
            liblz4-tool libncurses5-dev libsdl1.2-dev libssl-dev \
            libxml2 libxml2-utils lzop pngcrush rsync \
            schedtool squashfs-tools xsltproc zip zlib1g-dev \
            python3 python3-pip

      - name: Install repo tool (FIXED)
        run: |
          mkdir -p ~/bin
          curl -o ~/bin/repo https://storage.googleapis.com/git-repo-downloads/repo
          chmod +x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Initialize OrangeFox source
        run: |
          mkdir fox
          cd fox
          repo init -u https://github.com/OrangeFoxRecovery/manifest.git -b fox_14.1
          repo sync -c --force-sync --no-clone-bundle --no-tags -j$(nproc --all)

      - name: Clone device tree
        run: |
          cd fox/device
          mkdir -p oukitel
          cp -r ../../device-oukitel-WP19_Pro oukitel/WP19_Pro

      - name: Fix vendor_boot compatibility
        run: |
          cd fox
          export ALLOW_MISSING_DEPENDENCIES=true
          export FOX_USE_SPECIFIC_MIRROR=true
          export FOX_BUILD_DEVICE=WP19_Pro

      - name: Build OrangeFox
        run: |
          cd fox
          source build/envsetup.sh
          lunch omni_WP19_Pro-eng
          mka recoveryimage -j$(nproc --all)

      - name: Upload recovery
        uses: actions/upload-artifact@v4
        with:
          name: OrangeFox-WP19_Pro
          path: fox/out/target/product/*/recovery.img
