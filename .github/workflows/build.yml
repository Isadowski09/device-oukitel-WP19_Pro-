name: OrangeFox - Build

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'OrangeFox Manifest Branch'
        required: true
        default: '12.1'
        type: choice
        options:
        - 12.1
        - 11.0
      DEVICE_TREE:
        description: 'OrangeFox Device Tree'
        required: true
        default: 'https://github.com/Mostafameesr/Neom_android_device_xiaomi_sweet-TWRP'
      DEVICE_TREE_BRANCH:
        description: 'OrangeFox Device Tree Branch'
        required: true
        default: 'fox_12.1'
      DEVICE_PATH:
        description: 'Specify your Device Path'
        required: true
        default: 'device/xiaomi/sweet'
      DEVICE_NAME:
        description: 'Specify your Device Codename'
        required: true
        default: 'sweet'
      BUILD_TARGET:
        description: 'Specify your Build Target'
        required: true
        default: 'recovery'
        type: choice
        options:
        - boot
        - recovery
        - vendorboot

jobs:
  build:
    name: Build OFR by ${{ github.actor }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure Git Credentials
      run: |
        # Inject GITHUB_TOKEN to bypass interactive authentication
        git config --global url."https://${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
        git config --global user.name "${{ github.actor }}"
        git config --global user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
              
    - name: Clean-up
      uses: rokibhasansagar/slimhub_actions@main

    - name: Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 24
      
    - name: Build Environment
      run: |
        sudo apt install aria2 -y
        git clone https://gitlab.com/OrangeFox/misc/scripts.git -b master
        cd scripts
        sudo bash setup/android_build_env.sh
      
    - [span_3](start_span)name: Set-up Manifest
      run: |
        # Ensure fresh state to avoid corrupted repo initialization[span_3](end_span)
        rm -rf ${GITHUB_WORKSPACE}/OrangeFox
        mkdir -p ${GITHUB_WORKSPACE}/OrangeFox
        cd ${GITHUB_WORKSPACE}/OrangeFox
        repo init -u https://github.com/OrangeFoxRecovery/manifest.git -b ${{ inputs.MANIFEST_BRANCH }} --depth=1
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Clone Device Tree
      run: |
        cd ${GITHUB_WORKSPACE}/OrangeFox
        git clone ${{ inputs.DEVICE_TREE }} -b ${{ inputs.DEVICE_TREE_BRANCH }} ./${{ inputs.DEVICE_PATH }}

    - name: Building OrangeFox
      run: |
        cd ${GITHUB_WORKSPACE}/OrangeFox
        
        # Dependency fix
        mkdir -p system/tools/hidl/vts/fuzzer
        cat << 'EOF' > system/tools/hidl/vts/fuzzer/Android.bp
        cc_defaults { name: "vts_proto_fuzzer_default" }
        cc_defaults { name: "VtsHalDriverDefaults" }
        cc_defaults { name: "VtsHalProfilerDefaults" }
        EOF
        
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        lunch twrp_${{ inputs.DEVICE_NAME }}-eng && mka adbd ${{ inputs.BUILD_TARGET }}image

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: OrangeFox-Build-${{ inputs.DEVICE_NAME }}
        path: |
          out/target/product/${{ inputs.DEVICE_NAME }}/OrangeFox*.img
          out/target/product/${{ inputs.DEVICE_NAME }}/OrangeFox*.zip
        if-no-files-found: error
